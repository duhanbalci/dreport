<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dreport - Render Test</title>
  <style>
    /* @font-face declarations — must match the fonts used by PDF renderer */
    @font-face {
      font-family: 'Noto Sans';
      src: url('/fonts/NotoSans-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'Noto Sans';
      src: url('/fonts/NotoSans-Bold.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
    }
    @font-face {
      font-family: 'Noto Sans';
      src: url('/fonts/NotoSans-Italic.ttf') format('truetype');
      font-weight: 400;
      font-style: italic;
    }
    @font-face {
      font-family: 'Noto Sans';
      src: url('/fonts/NotoSans-BoldItalic.ttf') format('truetype');
      font-weight: 700;
      font-style: italic;
    }
    @font-face {
      font-family: 'Noto Sans Mono';
      src: url('/fonts/NotoSansMono-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: white; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/render-test/main.ts"></script>
</body>
</html>
